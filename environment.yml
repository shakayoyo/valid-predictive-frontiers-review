name: valid-predictive-frontier
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy>=1.24
  - pandas>=2.0
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - pyyaml>=6.0
  - statsmodels>=0.14
  - pytest>=7.4
  - pip
  - pip:
      - requests>=2.31
      # Optional for rerunning local open-weight Qwen sweeps.
      # The DAG environment used torch 2.6.0+cu124 and transformers 4.51.3.
      - transformers==4.51.3
      - tokenizers>=0.21,<0.22
      - accelerate>=1.6
      - sentencepiece>=0.2
      - safetensors>=0.5
